[[language]]
name = "rust"
# text-width = 80
language-servers = ["snippets-ls", "rust-analyzer"]

[language.auto-pairs]
'(' = ")"
'{' = "}"
'[' = "]"
'"' = '"'
# '<' = ">"

[[grammar]]
name = "kanata"
source = { git = "https://github.com/postsolar/tree-sitter-kanata/", rev = "master" }

# [[grammar]]
# name = "typst"
# source.git = "https://github.com/uben0/tree-sitter-typst"
# source.rev = "master"

[[language]]
# name = "typst"
# auto-format = true
# formatter = ["typstyle"]
# roots = ["main.typ", "report.typ", "tinymist.lock", "out/"]
# language-servers = ["tinymist"]
### Defaults, as of 02/11-2025
name = "typst"
scope = "source.typst"
injection-regex = "typ(st)?"
file-types = ["typst", "typ"]
comment-token = "//"
block-comment-tokens = { start = "/*", end = "*/" }
language-servers = ["tinymist"]
indent = { tab-width = 2, unit = "  " }

### Mine
auto-format = true
formatter = ["typstyle"]
roots = ["main.typ", "out/", "tinymist.lock"]
[language.auto-pairs]
'"' = '"'
'`' = '`'
'(' = ')'
'{' = '}'
'[' = ']'
'$' = '$'

[language-server.tinymist]
command = "tinymist"
# args = ["lsp"]

[language-server.tinymist.config]
formatterMode = "typstyle"
exportPdf = "onType"
outputPath = "$root/out/$name"
preview.background.enabled = true
formatterPrintWidth = 80
lint.enabled = true
lint.when = "onType"
projectResolution = "lockDatabase"
# projectResolution = "singleFile"
# typstExtraArgs = ["main.typ"]

# Need both commands, evnen though top one is default
preview.background.args = [
  "--data-plane-host=127.0.0.1:23635",
  "--invert-colors=never",
]
typingContinueCommentsOnNewLine = false

[language-server.snippets-ls]
command = "snippets-ls"
args = ["-config", "home/angryluck/.config/helix/snippets/rust.json"]


[[language]]
name = "elm"
language-servers = ["elm-language-server"]

[language-server.elm-language-server]
command = "elm-language-server"
args = ["--stdio"]

[[lanuguage]]
name = "nushell"
formatter.command = "nufmt"
formatter.args = ["-s"]
auto-format = false         # Very unstable program (allegedly), careful!


[[language]]
name = "hyprlang"
scope = "source.hyprlang"
roots = ["hyprland.conf"]
file-types = [{ glob = "hypr/*.conf" }, { glob = "mango/**/*.conf" }]
comment-token = "#"
grammar = "hyprlang"
language-servers = ["hyprls"]


# Base copied from upstream, so more configs can be added
[[language]]
name = "ini"
scope = "source.ini"
file-types = [
  "ini",
  "desktop",
  { glob = "mimeapps.list" },
  # Podman quadlets
  "container",
  "volume",
  "kube",
  "network",
  { glob = ".editorconfig" },
  { glob = ".npmrc" },
  { glob = "hgrc" },
  { glob = "npmrc" },
  { glob = "rclone.conf" },
  { glob = ".aws/config" },
  "properties",
  "cfg",
  "directory",
  { glob = ".wslconfig" },
]
injection-regex = "ini"
comment-token = "#"
indent = { tab-width = 4, unit = "\t" }


[[language]]
name = "python"
scope = "source.python"
injection-regex = "py(thon)?"
file-types = [
  "py",
  "pyi",
  "py3",
  "pyw",
  "ptl",
  "rpy",
  "cpy",
  "ipy",
  "pyt",
  { glob = ".python_history" },
  { glob = ".pythonstartup" },
  { glob = ".pythonrc" },
  { glob = "*SConstruct" },
  { glob = "*SConscript" },
  { glob = "*sconstruct" },
]
shebangs = ["python", "uv"]
roots = ["pyproject.toml", "setup.py", "poetry.lock", "pyrightconfig.json"]
comment-token = "#"
language-servers = ["ty", "ruff", "jedi", "pylsp"] #disable ty
# TODO: pyls needs utf-8 offsets
indent = { tab-width = 4, unit = "    " }
auto-format = true

# [language-server.ty.config]
# interpreter = ["$PYTHONPATH"]
[language-server.nil.config]
nix.flake.autoArchive = true
nix.flake.autEvalInputs = true

[[language]]
name = "perl"
scope = "source.perl"
file-types = [
  # "pl", # disable pl, so it doesn't interfere with prolog
  "pm",
  "t",
  "psgi",
  "raku",
  "rakumod",
  "rakutest",
  "rakudoc",
  "nqp",
  "p6",
  "pl6",
  "pm6",
  { glob = "latexmkrc" },
  { glob = ".latexmkrc" },
]
shebangs = ["perl"]
comment-token = "#"
language-servers = ["perlnavigator"]
indent = { tab-width = 2, unit = "  " }
