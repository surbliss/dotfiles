# add it to your ~/.config/helix/languages.toml

[language-server.fsharp-ls]
command = "fsautocomplete"
args = ["--verbose"]
config = { AutomaticWorkspaceInit = true, FSharp = { ExternalAutocomplete = true } }

[[language]]
name = "fsharp"
scope = "source.fs"
roots = ["fsproj", "sln", ".git"]
file-types = ["fs", "fsx", "fsi"]
language-servers = ["fsharp-ls"]
comment-token = "//"
indent = { tab-width = 4, unit = " " }
auto-format = true

[[language]]
name = "kanata"
scope = "source.kanata"
file-types = ["kbd"]
comment-tokens = [";;"]
block-comment-tokens = [{ start = "#|", end = "|#" }]

# [[language]]
# name = "haskell"
# auto-format = true
# roots = ["Setup.hs", "stack.yaml", "cabal.project", "src/"]

[[language]]
name = "haskell"
scope = "source.haskell"
injection-regex = "hs|haskell"
file-types = ["hs", "hs-boot", "hsc"]
roots = ["Setup.hs", "stack.yaml", "cabal.project", "hie.yaml", "src/"]
shebangs = ["runhaskell", "stack"]
comment-token = "--"
block-comment-tokens = { start = "{-", end = "-}" }
language-servers = ["haskell-language-server"]
indent = { tab-width = 2, unit = "  " }
# NOTE: Enable when figured out how to prevent stalling...
auto-format = true

[language-server.haskell-language-server.config]
haskell.formattingProvider = "fourmolu"
haskell.sessionLoading = "multipleComponents"

[[language]]
name = "cabal"
auto-format = true
roots = ["*.cabal", ".cabal", "Setup.hs", "stack.yaml", "cabal.project"]

