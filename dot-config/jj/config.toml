[user]
name = "Thomas Holme Surlykke"
email = "thomas.dev@surlykke.dk"


[git]
colocate = true
write-change-id-header = true


[ui]
movement.edit = true
pager = "delta"
log-word-wrap = true
default-command = ["log", "-n", "10", "--reversed", "-T", "log_compact"]
merge-editor = ":builtin"
diff-editor = ":builtin"


# --- Log node symbols ---
[templates]
log_node = '''
  label("node",
    coalesce(
      if(!self, label("elided", "~")),
      if(current_working_copy, label("working_copy", "@")),
      if(conflict, label("conflict", "×")),
      if(divergent, label("divergent", "!")),
      if(immutable, label("immutable", "◆")),
      if(empty, label("normal", "○")),
      label("normal", "◉")
    )
  )
'''

### Default log-format
log = '''
  if(root,
    format_root_commit(self),
    label(if(current_working_copy, "working_copy"),
      separate(" ",
        format_short_change_id_with_change_offset(self),
        bookmarks,
        tags,
        working_copies,
        format_git_head(),
        format_description(),
        author.name(),
        format_timestamp(committer.timestamp()),
        if(current_working_copy, format_changes())
      ),
    )
  )
'''


[template-aliases]
# Default log template (used by default-command above).
# Shows diff.summary() only for the working copy.
log_compact = '''
  if(root,
    format_root_commit(self),
    label(if(current_working_copy, "working_copy"),
      separate(" ",
        format_short_change_id_with_change_offset(self),
        bookmarks,
        tags,
        format_description(),
        format_short_signature(author),
        format_timestamp(committer.timestamp()),
        if(current_working_copy, format_changes())
      ),
    )
  )
'''

# Like the log template above, but shows diff.summary() for every commit.
# Used by the 'changes' alias below.
with_changes = '''
  if(root,
    format_root_commit(self),
    label(if(current_working_copy, "working_copy"),
      separate(" ",
        format_short_change_id_with_change_offset(self),
        bookmarks,
        tags,
        working_copies,
        format_git_head(),
        format_description(),
        author.name(),
        format_timestamp(committer.timestamp()),
        format_changes()
      ),
    )
  )
'''



### Helper-templates
### To override builtins: See https://github.com/jj-vcs/jj/blob/main/cli/src/config/templates.toml
"format_description()" = '''
  separate(" ",
    if(empty, label("empty", "(empty)")),
    if(conflict, label("conflict", "conflict")),
    if(description,
      description.first_line(),
      description_placeholder,
    ),
  )
'''
description_placeholder = '''
label("description placeholder", if(empty, "", "(no description set)"))
'''

"format_changes()" = "'\n' ++ diff.summary()"

"format_short_signature(author)" = "author.name().split(' ').map(|n| n.substr(0, 1)).join('')"

"format_timestamp(timestamp)" = "timestamp.ago()"

'format_short_change_id(id)' = 'id.shortest(4)'
"format_git_head()" =  'if(self.contained_in("first_parent(@)"), label("git_head", "HEAD"))'




[aliases]

# Move the nearest bookmark ancestor of @- forward to @-
tug = ["bookmark", "move", "--from", "heads(::@- & bookmarks())", "--to", "@-"]

# Log with diff.summary() for every commit, not just working copy
changes = ["log", "--template", "with_changes"]

# New commit on top of the latest descendant of @- (useful when @ is behind)
newest = ["new", "heads(@-::) ~ @"]

# Split a fileset into its own commit inserted before the 'merge' commit and after root.
# Usage: jj sep <revison> <fileset(s)>, maybe "-B" revision if new parallel branch
sep = ["squash", "--keep-emptied", "-A"]


[revset-aliases]
# What 'jj log' shows by default: ancestry from trunk to @, plus recent visible heads
'default()' = 'coalesce(trunk(),root())::present(@) | ancestors(visible_heads() & recent())'

# Recent = committed within the last month
'recent()' = 'committer_date(after:"1 month ago")'

# All "tip" commits: @, visible heads near trunk, and trunk itself
"ends()" = "@ | ancestors(trunk()..(visible_heads()), 2) | trunk()"

# Nearest bookmark ancestor of a given revision
'closest_bookmark(to)' = 'heads(::to & bookmarks())'


[colors]
# Catppuccin Mocha palette (ANSI 256-color codes), for reference:
# Lavender 147 · Teal/Teal 152 · Peach 216 · Mauve 177
# Green 157 · Red/Pink 211 · Yellow 229 · Sky 117

# Note: setting diff colors here breaks delta's own coloring, so those are left unset.

# See https://github.com/jj-vcs/jj/blob/main/cli/src/config/colors.toml for examples
bookmarks = "ansi-color-177"

"timestamp" = "bright black"
"working_copy timestamp" = "bright black"
"git_head" = "ansi-color-216"
"empty" = "green"
"empty description placeholder" = "green"
"description placeholder" = "ansi-color-211"
"working_copy empty" = "green"
"working_copy empty description placeholder" = "green"
"author" = "bright magenta"
"working_copy author" = "bright magenta"
"prefix" = "ansi-color-216"
"node working_copy" =  "ansi-color-147"
# This one is fine tho?
"diff modified" = "yellow" # This diff seems fine to modify
