console_title_template: '{{ .Shell }} in {{ .Folder }}'
version: 3
final_space: true

blocks:
  - type: prompt
    alignment: left
    newline: true
    segments:
      # - template: '{{ if contains "/nix/store" (env "PATH") }} {{ end }}'
      - template: '{{ if or (env "IN_NIX_SHELL") (env "DIRENV_DIR") }} {{ end }}'
        foreground: cyan
        background: transparent
        type: text
        style: plain
        properties:
          cache_duration: none
      - template: '{{ .Path }}'
        foreground: blue
        background: transparent
        type: path
        style: plain
        properties:
          cache_duration: none
          style: agnoster_short
          max_depth: 3
          folder_icon: "\U000F01D8"
          hide_root_location: true
      - type: jujutsu
        # template: '\UF1FA {{.ChangeID}}{{if .Working.Changed}} \uf044 {{ .Working.String }}{{ end }}'
        style: plain
        foreground: "p.grey"
        background: "transparent"
        options:
          fetch_status: true
          ignore_working_copy: false
          fetch_ahead_counter: true
          # ahead_icon: ⇡
          # - template: ' {{ .HEAD }}{{ if or (.Working.Changed) (.Staging.Changed) }}*{{ end }} <cyan>{{ if gt .Behind 0 }}⇣{{ end }}{{ if gt .Ahead 0 }}⇡{{ end }}</>'
          #   foreground: p:grey
          #   background: transparent
          #   type: git
          #   style: plain
          #   properties:
          #     branch_icon: ''
          #     cache_duration: none
          #     commit_icon: '@'
          #     fetch_status: true

  - type: rprompt
    overflow: hidden
    segments:
      - template: '{{ .FormattedMs }}'
        foreground: yellow
        background: transparent
        type: executiontime
        style: plain
        properties:
          cache_duration: none
          threshold: 3000
          style: round
  - type: prompt
    alignment: left
    newline: true
    segments:
      - template: ❯
        background: transparent
        type: text
        style: plain
        foreground_templates:
          - '{{if gt .Code 0}}red{{end}}'
          - '{{if eq .Code 0}}magenta{{end}}'
        properties:
          cache_duration: none

secondary_prompt:
  template: '❯❯ '
  foreground: magenta
  background: transparent

transient_prompt:
  template: '❯ '
  background: transparent
  foreground_templates:
    - '{{if gt .Code 0}}red{{end}}'
    - '{{if eq .Code 0}}magenta{{end}}'

palette:
  grey: '#6c6c6c'

