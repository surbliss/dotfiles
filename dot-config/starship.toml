[nix_shell]
impure_msg = ""
symbol = "ΎΝΥ "
format = '[$symbol](bold blue) '

[fill]
symbol = " "

[custom.jj]
command = "prompt"
format = "$output"
ignore_timeout = true
shell = ["starship-jj", "--ignore-working-copy", "starship"]
use_stdin = false
when = true


